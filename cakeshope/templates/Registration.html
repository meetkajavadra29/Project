<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration with Strength Meter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Open Sans', sans-serif;
            display: flex;
            flex-direction:column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 450px;
            max-width: 100%;
        }

        .header {
            background-color: #f7f7f7;
            border-bottom: 1px solid #eee;
            padding: 20px 40px;
            text-align: center;
        }

        .header h2 {
            margin: 0;
            color: #333;
        }

        .form {
            padding: 30px 40px;
        }

        .form-control {
            margin-bottom: 15px;
            padding-bottom: 20px;
            position: relative;
        }

        .form-control label {
            display: inline-block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-control input, 
        .form-control textarea {
            border: 2px solid #ddd;
            border-radius: 4px;
            display: block;
            font-family: inherit;
            font-size: 14px;
            padding: 12px;
            width: 100%;
            transition: border-color 0.3s;
        }

        .form-control input:focus,
        .form-control textarea:focus {
            outline: none;
            border-color: #777;
        }

        /* Password Eye Icon */
        .password-container {
            position: relative;
        }
        
        .password-container i {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            color: #999;
        }

        .form-control textarea {
            resize: vertical;
            height: 80px;
        }

        /* Validation Colors */
        .form-control.success input,
        .form-control.success textarea {
            border-color: #2ecc71;
        }

        .form-control.error input,
        .form-control.error textarea {
            border-color: #e74c3c;
        }

        /* Error Message */
        .form-control small {
            color: #e74c3c;
            position: absolute;
            bottom: 0;
            left: 0;
            visibility: hidden;
            font-size: 12px;
            font-weight: 600;
        }

        .form-control.error small {
            visibility: visible;
        }

        /* --- Password Strength Meter --- */
        .strength-meter {
            height: 4px;
            width: 100%;
            background-color: #eee;
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
            display: none; /* Hidden by default until user types */
        }
        
        .strength-meter div {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }
        
        .strength-text {
            font-size: 11px;
            margin-top: 5px;
            display: block;
            text-align: right;
            font-weight: bold;
            color: #777;
            min-height: 15px; /* prevent layout jump */
        }

        /* Button Styling */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            border: none;
            border-radius: 4px;
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            padding: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.1s ease, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-submit {
            background-color: #3498db;
        }

        .btn-reset {
            background-color: #95a5a6;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 500px) {
            .container {
                width: 100%;
            }
            
            .header {
                padding: 15px 20px;
            }
            
            .form {
                padding: 20px 20px;
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
            }
            
            /* Order: Put submit on top in mobile for better UX */
            .btn-submit {
                order: 1;
            }
            .btn-reset {
                order: 2;
            }
        }
    </style>
</head>
<body>
    {% if messages %}
    {%for message in messages%}
    <div class="alert alert-warning alert-dismissible fade show" role="alert">
        {{message}}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {%endfor%}
    {% endif%}
    <div class="container">
        <div class="header">
            <h2>Create Account</h2>
        </div>
        <form id="form" class="form" method='post' >
            {% csrf_token %}
            <div class="form-control">
                <label for="firstname">First Name</label>
                <input type="text" placeholder="John" id="firstname" name='fname'/>
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="lastname">Last Name</label>
                <input type="text" placeholder="Doe" id="lastname" name='lname'/>
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="username">Username</label>
                <input type="text" placeholder="johndoe123" id="username" name='username' />
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="email">Email</label>
                <input type="email" placeholder="john@example.com" id="email" name='email' />
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="phone">Phone Number</label>
                <input type="tel" placeholder="1234567890" id="phone" name='phone' />
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="address">Address</label>
                <textarea id="address" placeholder="1234 Main St, City" name='add'></textarea>
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="password">Password</label>
                <div class="password-container">
                    <input type="password" placeholder="********" id="password" name='pass'/>
                    <i class="fas fa-eye" id="togglePassword"></i>
                </div>
                
                <div class="strength-meter" id="strengthMeter">
                    <div id="strengthBar"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
                
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="checkPassword">Confirm Password</label>
                <input type="password" placeholder="********" id="checkPassword" />
                <small>Error message</small>
            </div>

            <div class="button-group">
                <button type="reset" class="btn-reset" id="resetBtn">Reset</button>
                <button type="submit" class="btn-submit">Register</button>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('form');
        const resetBtn = document.getElementById('resetBtn');
        
        // Input Selectors
        const firstname = document.getElementById('firstname');
        const lastname = document.getElementById('lastname');
        const email = document.getElementById('email');
        const phone = document.getElementById('phone');
        const address = document.getElementById('address');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const checkPassword = document.getElementById('checkPassword');

        // Strength Meter Selectors
        const strengthMeter = document.getElementById('strengthMeter');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        // Toggle Password Logic
        const togglePassword = document.querySelector('#togglePassword');
        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Password Strength Logic
        password.addEventListener('input', () => {
            const val = password.value;
            const meter = document.getElementById('strengthMeter');
            
            // Show meter if typing starts
            if(val.length > 0) {
                meter.style.display = 'block';
            } else {
                meter.style.display = 'none';
                strengthText.innerText = '';
                return;
            }

            let score = 0;
            // 1. Check Length
            if(val.length >= 8) score++;
            // 2. Check Number
            if(/\d/.test(val)) score++;
            // 3. Check Special Char or Uppercase
            if(/[!@#$%^&*(),.?":{}|<>]/.test(val) || /[A-Z]/.test(val)) score++;

            // Update UI based on score
            if(val.length < 5) {
                 // Too short (Weakest)
                 updateStrength(20, '#e74c3c', 'Too Short');
            } else if (score === 1) {
                updateStrength(40, '#e74c3c', 'Weak');
            } else if (score === 2) {
                updateStrength(70, '#f1c40f', 'Medium');
            } else if (score === 3) {
                updateStrength(100, '#2ecc71', 'Strong');
            }
        });

        function updateStrength(width, color, text) {
            strengthBar.style.width = width + '%';
            strengthBar.style.backgroundColor = color;
            strengthText.innerText = text;
            strengthText.style.color = color;
        }

        // Form Submission
         form.addEventListener('submit', e => {
            e.preventDefault();
            
            if(checkInputs()) {
                 form.submit();
            }
        }); 

        // Reset Logic
        resetBtn.addEventListener('click', () => {
            const formControls = document.querySelectorAll('.form-control');
            formControls.forEach(control => {
                control.className = 'form-control'; 
            });
            // Reset strength meter
            strengthMeter.style.display = 'none';
            strengthText.innerText = '';
        });

        function checkInputs() {
            let isValid = true;
            
            const firstnameValue = firstname.value.trim();
            const lastnameValue = lastname.value.trim();
            const emailValue = email.value.trim();
            const phoneValue = phone.value.trim();
            const addressValue = address.value.trim();
            const usernameValue = username.value.trim();
            const passwordValue = password.value.trim();
            const checkPasswordValue = checkPassword.value.trim();

            if(firstnameValue === '') { setErrorFor(firstname, 'First name required'); isValid = false; } else { setSuccessFor(firstname); }
            if(lastnameValue === '') { setErrorFor(lastname, 'Last name required'); isValid = false; } else { setSuccessFor(lastname); }
            
            if(usernameValue === '') { setErrorFor(username, 'Username required'); isValid = false; } 
            else if(usernameValue.length < 5) { setErrorFor(username, 'Min 5 characters'); isValid = false; } 
            else { setSuccessFor(username); }

            if(emailValue === '') { setErrorFor(email, 'Email required'); isValid = false; } 
            else if (!isEmail(emailValue)) { setErrorFor(email, 'Invalid email'); isValid = false; } 
            else { setSuccessFor(email); }

            if(phoneValue === '') { setErrorFor(phone, 'Phone required'); isValid = false; } 
            else if (!isPhone(phoneValue)) { setErrorFor(phone, 'Enter 10-digit number'); isValid = false; } 
            else { setSuccessFor(phone); }

            if(addressValue === '') { setErrorFor(address, 'Address required'); isValid = false; } else { setSuccessFor(address); }

            // Password Validation
            if(passwordValue === '') { 
                setErrorFor(password, 'Password required'); 
                isValid = false; 
            } else if(passwordValue.length < 6) { 
                setErrorFor(password, 'Min 6 characters'); 
                isValid = false; 
            } else { 
                setSuccessFor(password); 
            }

            if(checkPasswordValue === '') { 
                setErrorFor(checkPassword, 'Confirm password required'); 
                isValid = false; 
            } else if(passwordValue !== checkPasswordValue) { 
                setErrorFor(checkPassword, 'Passwords do not match'); 
                isValid = false; 
            } else { 
                setSuccessFor(checkPassword); 
            }

            return isValid;
        }

        function setErrorFor(input, message) {
            const formControl = input.closest('.form-control');
            const small = formControl.querySelector('small');
            formControl.className = 'form-control error';
            small.innerText = message;
        }

        function setSuccessFor(input) {
            const formControl = input.closest('.form-control');
            formControl.className = 'form-control success';
        }

        function isEmail(email) {
            return /^(([^<>()\[\]\\.,;:\s@"]+(\.[^<>()\[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/.test(email);
        }

        function isPhone(phone) {
            return /^\d{10}$/.test(phone);
        }
    </script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
