<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Open Sans', sans-serif;
            display: flex;
            flex-direction:column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 400px;
            max-width: 100%;
        }

        .header {
            background-color: #f7f7f7;
            border-bottom: 1px solid #eee;
            padding: 20px 40px;
            text-align: center;
        }

        .header h2 {
            margin: 0;
            color: #333;
        }

        .form {
            padding: 30px 40px;
        }

        .form-control {
            margin-bottom: 20px;
            padding-bottom: 20px;
            position: relative;
        }

        .form-control label {
            display: inline-block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        .form-control input {
            border: 2px solid #ddd;
            border-radius: 4px;
            display: block;
            font-family: inherit;
            font-size: 14px;
            padding: 12px;
            width: 100%;
            transition: border-color 0.3s;
        }

        .form-control input:focus {
            outline: none;
            border-color: #777;
        }

        /* Password Eye Icon Wrapper */
        .password-container {
            position: relative;
        }
        
        .password-container i {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            color: #999;
        }

        /* Validation Colors */
        .form-control.success input {
            border-color: #2ecc71;
        }

        .form-control.error input {
            border-color: #e74c3c;
        }

        .form-control small {
            color: #e74c3c;
            position: absolute;
            bottom: 0;
            left: 0;
            visibility: hidden;
            font-size: 12px;
            font-weight: 600;
        }

        .form-control.error small {
            visibility: visible;
        }

        button {
            background-color: #3498db; /* Orange color to differentiate from Login */
            border: none;
            border-radius: 4px;
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            padding: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #d35400;
        }

        /* Footer Link */
        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .form-footer a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Reset Password</h2>
        </div>
        {% if messages %}
        {%for message in messages%}
          <div class="alert alert-warning alert-dismissible fade show" role="alert">
            {{message}}
            <input type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close">
          </div>
        {%endfor%}
        {% endif%}
       
        <form id="form" class="form" method="post">
            {% csrf_token %}
            <div class="form-control">
                <label for="username">Username</label>
                <input type="text" placeholder="Enter your username" id="username" name="username" />
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="newPassword">New Password</label>
                <div class="password-container">
                    <input type="password" placeholder="Enter new password" id="newPassword" name="password" />
                    <i class="fas fa-eye" id="toggleNewPassword"></i>
                </div>
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" placeholder="Confirm new password" id="confirmPassword" />
                <small>Error message</small>
            </div>

            <button type="submit">Update Password</button>

            <div class="form-footer">
                <p>Remembered it? <a href="/loginuser">Back to Login</a></p>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('form');
        const username = document.getElementById('username');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const toggleNewPassword = document.getElementById('toggleNewPassword');

        // Toggle Password Visibility
        toggleNewPassword.addEventListener('click', function () {
            const type = newPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            newPassword.setAttribute('type', type);
            // Toggle the eye icon
            this.classList.toggle('fa-eye-slash');
        });

        // Form Submit
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            if(checkInputs()) {
                // Success Scenario
                form.submit()
            }
        });

        function checkInputs() {
            let isValid = true;
            
            const usernameValue = username.value.trim();
            const newPasswordValue = newPassword.value.trim();
            const confirmPasswordValue = confirmPassword.value.trim();

            // Username Validation
            if(usernameValue === '') {
                setErrorFor(username, 'Username cannot be empty');
                isValid = false;
            } else {
                setSuccessFor(username);
            }

            // New Password Validation
            if(newPasswordValue === '') {
                setErrorFor(newPassword, 'New password cannot be empty');
                isValid = false;
            } else if (newPasswordValue.length < 6) {
                setErrorFor(newPassword, 'Password must be at least 6 chars');
                isValid = false;
            } else {
                setSuccessFor(newPassword);
            }

            // Confirm Password Validation
            if(confirmPasswordValue === '') {
                setErrorFor(confirmPassword, 'Please confirm your password');
                isValid = false;
            } else if (newPasswordValue !== confirmPasswordValue) {
                setErrorFor(confirmPassword, 'Passwords do not match');
                isValid = false;
            } else {
                setSuccessFor(confirmPassword);
            }

            return isValid;
        }

        function setErrorFor(input, message) {
            const formControl = input.closest('.form-control');
            const small = formControl.querySelector('small');
            formControl.className = 'form-control error';
            small.innerText = message;
        }

        function setSuccessFor(input) {
            const formControl = input.closest('.form-control');
            formControl.className = 'form-control success';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
</body>
</html>
